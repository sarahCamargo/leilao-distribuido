<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Leilao Distribuido</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Leilão Distribuído</h1>
    </header>

    <main>
        <section class="card">
            <h2>Dar um lance</h2>
            <form id="form-lance">
                <div class="campo">
                    <label for="leilaoId">Leilao</label>
                    <input type="number" id="leilaoId" name="leilaoId" min="1" required>
                </div>
                <div class="campo">
                    <label for="usuario">Usuario</label>
                    <input type="text" id="usuario" name="usuario" required>
                </div>
                <div class="campo">
                    <label for="valor">Valor (R$)</label>
                    <input type="number" id="valor" name="valor" step="0.01" min="0.01" required>
                </div>
                <button type="submit">Enviar lance</button>
            </form>
        </section>

        <section class="card">
            <h2>Lances recentes</h2>
            <div class="filtro">
                <label for="filtro-leilao">Filtrar por leilao (ID)</label>
                <input type="number" id="filtro-leilao" min="1" placeholder="todos">
                <button id="btn-filtrar" type="button">Filtrar</button>
                <button id="btn-limpar" type="button" class="secundario">Limpar</button>
            </div>
            <table id="tabela-lances">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Leilao</th>
                        <th>Usuario</th>
                        <th>Valor</th>
                        <th>Data/Hora</th>
                    </tr>
                </thead>
                <tbody id="lista-lances">
                    <tr class="vazio"><td colspan="5">Nenhum lance ainda.</td></tr>
                </tbody>
            </table>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
